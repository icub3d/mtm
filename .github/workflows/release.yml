name: Release builds

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ASSET_NAME="mtm-${OS}-${ARCH}.tar.gz"
          mkdir -p dist
          cp target/release/mtm dist/mtm
          tar -C dist -czf "dist/$ASSET_NAME" mtm
          rm dist/mtm
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_path=dist/$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_unix.outputs.asset_name }}
          path: ${{ steps.package_unix.outputs.asset_path }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        id: package_win
        shell: pwsh
        run: |
          $arch = $Env:PROCESSOR_ARCHITECTURE.ToLower()
          $os = "windows"
          $assetName = "mtm-$os-$arch.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target/release/mtm.exe dist/mtm.exe
          Compress-Archive -Path dist/mtm.exe -DestinationPath "dist/$assetName" -Force
          Remove-Item dist/mtm.exe
          "asset_name=$assetName" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset_path=dist/$assetName" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_win.outputs.asset_name }}
          path: ${{ steps.package_win.outputs.asset_path }}

  publish:
    name: Attach assets to release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
